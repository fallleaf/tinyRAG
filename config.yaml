# config.yaml
# tinyRAG 核心配置文件

# 知识库仓库路径 (支持多个)
vaults:
  - path: "~/NanobotMemory"
    name: personal
    enabled: true
  - path: "~/Obsidian"
    name: work
    enabled: false

# 数据库配置
db_path: "./data/rag.db"

# 嵌入模型配置
embedding_model:
  name: "BAAI/bge-small-zh-v1.5"
  cache_dir: "~/.cache/fastembed"
  size: "small"
  dimensions: 512
  unload_after_seconds: 300
  batch_size: 64  # 模型推理批大小，影响 CPU 利用率，建议 32-128

# 分块配置
chunking:
  max_tokens: 512
  overlap: 50

# 流式处理配置（内存优化）
stream_batch_size: 256  # 每累积多少 chunks 进行一次向量化入库
max_concurrent_files: 2  # 并行处理文件数的上限，低内存设备建议设为 1-2

# 置信度与融合权重
confidence:
  type_rules:
    code: 1.1
    table: 1.05
    header: 1.0
    text: 0.95
    list: 0.9
  doc_type_rules:
    official: 1.2
    project: 1.15
    technical: 1.1
    personal: 0.9
    archive: 0.7
  status_rules:
    "published": 1.2
    "completed": 1.1
    "active": 0.9
    "draft": 0.7
    "archived": 0.5
  date_decay:
    enabled: true
    half_life_days: 365
    min_weight: 0.5
    type_specific_decay:
      official: 1825
      project: 730
      technical: 1095
      personal: 180
      archive: 90
  default_weight: 1.0

log_level: "INFO"

maintenance:
  soft_delete_threshold: 0.2
  auto_vacuum: true

cache:
  db_path: "./data/cache.db"
  ttl_seconds: 36000
  max_entries: 1000

retrieval:
  alpha: 0.7
  beta: 0.3

jieba_user_dict: "data/jieba_user_dict.txt"

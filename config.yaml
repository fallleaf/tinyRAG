vaults:
  - path: "/home/fallleaf/NanobotMemory"
    name: personal
    enabled: true
    exclude:
      dirs: []
      patterns: []
  - path: "/home/fallleaf/Obsidian"
    name: work
    enabled: true
    exclude:
      dirs:
        - "copilot"
        - "99.模板"
        - "Excalidraw"
        - "98.附件"
      patterns: []
exclude:
  dirs:
    - ".git"
    - ".obsidian"
    - ".trash"
    - "node_modules"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".idea"
    - ".vscode"
    - ".ruff_cache"
    - ".mypy_cache"
    - ".pytest_cache"
    - "dist"
    - "build"
    - ".egg-info"
  patterns:
    - ".*"
    - "*.tmp"
    - "*.bak"
    - "*.swp"
    - "*.swo"
    - "*~"
    - "*.pyc"
    - "*.pyo"
    - "*.exe"
    - "*.dll"
    - "*.so"
    - "*.dylib"
    - "*.zip"
    - "*.tar"
    - "*.gz"
    - "*.rar"
    - "*.7z"
    - "*.pdf"
    - "*.doc"
    - "*.docx"
    - "*.xls"
    - "*.xlsx"
    - "*.ppt"
    - "*.pptx"
    - "*.jpg"
    - "*.jpeg"
    - "*.png"
    - "*.gif"
    - "*.bmp"
    - "*.ico"
    - "*.svg"
    - "*.mp3"
    - "*.mp4"
    - "*.avi"
    - "*.mov"
    - "*.wav"
    - "*.flac"
    - "*.db"
    - "*.sqlite"
    - "*.sqlite3"
    - "*.log"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    - "Cargo.lock"
    - "poetry.lock"

db_path: "./data/rag.db"
embedding_model:
  name: "BAAI/bge-small-zh-v1.5"
  cache_dir: "~/.cache/fastembed"
  size: "small"
  dimensions: 512
  batch_size: 32
  unload_after_seconds: 300

chunking:
  max_tokens: 512
  overlap: 50
  token_mode: "tiktoken"
  chinese_chars_per_token: 1.5
  english_chars_per_token: 4.0
  max_chars_multiplier: 2.5

confidence:
  type_rules:
    code: 1.1
    table: 1.05
    header: 1.0
    text: 0.95
    list: 0.9
  doc_type_rules:
    official: 1.2
    project: 1.15
    technical: 1.1
    dairy: 0.9
    blog: 0.9
    archive: 0.7
  status_rules:
    published: 1.2
    已发布: 1.2
    completed: 1.1
    已完成: 1.1
    active: 0.9
    编写中: 0.9
    draft: 0.7
    archived: 0.5
    存档: 0.5
  date_decay:
    enabled: true
    half_life_days: 365
    min_weight: 0.5
    type_specific_decay:
      official: 1825
      project: 730
      technical: 1095
      personal: 180
      diary: 180
      archive: 90
  default_weight: 1.0

log_level: "INFO"
maintenance:
  soft_delete_threshold: 0.2
  auto_vacuum: true
cache:
  db_path: "./data/cache.db"
  ttl_seconds: 36000
  max_entries: 1000
retrieval:
  alpha: 0.7
  beta: 0.3
jieba_user_dict: "data/jieba_user_dict.txt"
stream_batch_size: 128
max_concurrent_files: 2

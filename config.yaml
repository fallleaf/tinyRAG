vaults:
  - path: "/home/fallleaf/NanobotMemory"
    name: personal
    enabled: true
    exclude:
      dirs: []
      patterns: []
  - path: "/home/fallleaf/Obsidian"
    name: work
    enabled: false
    exclude:
      dirs:
        - "copilot"
        - "99.模板"
        - "Excalidraw"
        - "98.附件"
      patterns: []
exclude:
  dirs:
    - ".git"
    - ".obsidian"
    - ".trash"
    - "node_modules"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".idea"
    - ".vscode"
    - ".ruff_cache"
    - ".mypy_cache"
    - ".pytest_cache"
    - "dist"
    - "build"
    - ".egg-info"
  patterns:
    - ".*"
    - "*.tmp"
    - "*.bak"
    - "*.swp"
    - "*.swo"
    - "*~"
    - "*.pyc"
    - "*.pyo"
    - "*.exe"
    - "*.dll"
    - "*.so"
    - "*.dylib"
    - "*.zip"
    - "*.tar"
    - "*.gz"
    - "*.rar"
    - "*.7z"
    - "*.pdf"
    - "*.doc"
    - "*.docx"
    - "*.xls"
    - "*.xlsx"
    - "*.ppt"
    - "*.pptx"
    - "*.jpg"
    - "*.jpeg"
    - "*.png"
    - "*.gif"
    - "*.bmp"
    - "*.ico"
    - "*.svg"
    - "*.mp3"
    - "*.mp4"
    - "*.avi"
    - "*.mov"
    - "*.wav"
    - "*.flac"
    - "*.db"
    - "*.sqlite"
    - "*.sqlite3"
    - "*.log"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    - "Cargo.lock"
    - "poetry.lock"

db_path: "./data/rag.db"
embedding_model:
  name: "BAAI/bge-small-zh-v1.5"
  cache_dir: "~/.cache/fastembed"
  size: "small"
  dimensions: 512
  batch_size: 16
  unload_after_seconds: 600

chunking:
  max_tokens: 512
  overlap: 50
  token_mode: "tiktoken"
  chinese_chars_per_token: 1.5
  english_chars_per_token: 4.0
  max_chars_multiplier: 2.5

confidence:
  type_rules:
    code: 1.1
    table: 1.05
    header: 1.0
    text: 0.95
    list: 0.9
  doc_type_rules:
    official: 1.2
    project: 1.15
    technical: 1.1
    dairy: 0.9
    blog: 0.9
    archive: 0.7
  status_rules:
    published: 1.2
    已发布: 1.2
    completed: 1.1
    已完成: 1.1
    active: 0.9
    编写中: 0.9
    draft: 0.7
    archived: 0.5
    存档: 0.5
  date_decay:
    enabled: true
    half_life_days: 365
    min_weight: 0.5
    type_specific_decay:
      official: 1825
      project: 730
      technical: 1095
      personal: 180
      diary: 180
      archive: 90
  default_weight: 1.0

log_level: "INFO"
maintenance:
  soft_delete_threshold: 0.2
  auto_vacuum: true
cache:
  db_path: "./data/cache.db"
  ttl_seconds: 36000
  max_entries: 500
retrieval:
  alpha: 0.7
  beta: 0.3
jieba_user_dict: "data/jieba_user_dict.txt"
stream_batch_size: 32
max_concurrent_files: 2

# =====================
# 插件配置 (v2.2+)
# =====================
plugins:
  enabled: true                    # 是否启用插件系统
  auto_discover: true              # 是否自动发现插件
  plugins:                         # 插件列表
    - name: tinyrag_memory_graph   # 图-向量混合记忆插件
      enabled: true
      priority: 100
      config:                      # 插件专属配置
        graph:
          enabled: true
          entity_types:
            - person
            - organization
            - location
            - concept
            - event
          relation_types:
            - related_to
            - part_of
            - caused_by
            - created_by
        retrieval:
          vector_weight: 0.6
          graph_weight: 0.4
          max_hops: 2
          doc_expand_top_k: 3      # 文档扩展召回数
        memify:
          enabled: true
          decay_rate: 0.1
          vacuum_interval_hours: 24
        # 提取配置（控制速度）
        extraction:
          chunk_mode: "spacy"           # rule(最快) / spacy(中等) / llm_fallback(最慢)
          chunk_timeout_ms: 100
          llm_fallback_threshold: 0    # 禁用 LLM 后备
          spacy_model: "zh_core_web_sm"
        # 队列配置（控制并发）
        queue:
          max_workers: 2               # 并行线程数
          max_queue_size: 1000
          task_timeout: 300
          max_retries: 3
        # 监控配置
        metrics:
          enabled: true
          output_dir: "./metrics"
        llm:
          model_path: qwen1_5-0_5b-chat-q4_k_m.gguf  # 默认目录 ~/.cache/llama.cpp
          # 或使用绝对路径
          # model_path: /home/z/.cache/llama.cpp/qwen1_5-0_5b-chat-q4_k_m.gguf
          n_ctx: 2048
          n_gpu_layers: 0  # CPU 模式
          temperature: 0.7
